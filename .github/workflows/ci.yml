name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  merge_group:
  workflow_dispatch:

# On PRs and merge queue: cancel stale runs when new commits arrive.
# On push to main: never cancel — a publish mid-flight must complete.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' || github.event_name == 'merge_group' }}

jobs:

  # ── Verify ────────────────────────────────────────────────────────────────
  # Runs on all events except workflow_dispatch (which is promote-only).
  # Make this job a required status check on main in branch protection settings.
  verify:
    if: github.event_name != 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
      - run: npm ci
      # TODO: add your lint, test, and build steps:
      # - run: npm run lint
      # - run: npm test
      # - run: npm run build

  # ── Publish @next ─────────────────────────────────────────────────────────
  # Runs on every push to main. Uses semantic-release to determine the version
  # from conventional commits, publish to npm under the @next dist-tag, and
  # create a GitHub pre-release. Nothing is published on PRs or merge_group.
  publish-next:
    needs: verify
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write   # create git tags and GitHub releases
      id-token: write   # npm provenance attestation
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # semantic-release needs full history
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          registry-url: https://registry.npmjs.org
      - run: npm ci
      - run: npx semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Promote @next → @latest ───────────────────────────────────────────────
  # Triggered manually via "Run workflow" in the GitHub Actions UI.
  # Reads whatever version is currently on @next, promotes it to @latest on
  # npm, and marks the corresponding GitHub pre-release as the latest release.
  # No rebuild — the same artifact is just re-tagged.
  #
  # Setup: create a "production" environment in repo Settings → Environments
  # and configure required reviewers for an approval gate before promotion.
  promote:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: write
      id-token: write   # OIDC — npm trusted publisher auth
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          registry-url: https://registry.npmjs.org
      - name: Resolve @next version
        id: resolve
        run: |
          PACKAGE=$(node -p "require('./package.json').name")
          VERSION=$(npm view "$PACKAGE" dist-tags.next 2>/dev/null)
          if [ -z "$VERSION" ]; then
            echo "::error::No @next version found for $PACKAGE — nothing to promote."
            exit 1
          fi
          echo "package=$PACKAGE" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"
          echo "Promoting $PACKAGE@$VERSION (@next → @latest)"
      - name: Promote @next → @latest on npm
        run: npm dist-tag add ${{ steps.resolve.outputs.package }}@${{ steps.resolve.outputs.version }} latest
      - name: Promote GitHub pre-release → latest release
        run: gh release edit ${{ steps.resolve.outputs.tag }} --prerelease=false --latest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
